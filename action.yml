name: "pxdiff Storybook Visual Regression"
description: "One-liner Storybook visual regression testing with pxdiff"
branding:
  icon: "eye"
  color: "purple"

inputs:
  api-key:
    description: "pxdiff API key"
    required: true
  build-dir:
    description: "Path to Storybook build directory"
    required: true
  suite:
    description: "Suite name"
    required: false
    default: "default"
  auto-baseline:
    description: "Set baselines from captured screenshots (no diff)"
    required: false
    default: "false"
  auto-approve:
    description: "Run diff and automatically approve all changes and set baselines"
    required: false
    default: "false"
  threshold:
    description: "Diff threshold (0.0-1.0)"
    required: false
  filter:
    description: "Glob pattern to filter stories"
    required: false
  only-changed:
    description: "Only capture stories affected by code changes (change detection)"
    required: false
    default: "false"
  api-url:
    description: "pxdiff API URL"
    required: false
    default: "https://pxdiff.com"
  cli-version:
    description: "CLI version range to install (default set at publish time)"
    required: false
    default: "~0.0.17"

outputs:
  diff-url:
    description: "URL to the diff review page"
    value: ${{ steps.result.outputs.diff-url }}
  status:
    description: "Result status (passed/failed)"
    value: ${{ steps.result.outputs.status }}
  changed:
    description: "Number of changed snapshots"
    value: ${{ steps.result.outputs.changed }}
  new:
    description: "Number of new snapshots"
    value: ${{ steps.result.outputs.new }}
  capture-id:
    description: "Capture ID"
    value: ${{ steps.result.outputs.capture-id }}
  diff-id:
    description: "Diff ID"
    value: ${{ steps.result.outputs.diff-id }}

runs:
  using: composite
  steps:
    - name: Install pxdiff CLI
      shell: bash
      run: |
        if npx --no -- pxdiff --version &>/dev/null; then
          echo "pxdiff already available, skipping install"
        else
          npm install -g @pxdiff/cli@${{ inputs.cli-version }}
        fi

    - name: Run npx pxdiff storybook
      id: capture
      shell: bash
      env:
        PXDIFF_API_KEY: ${{ inputs.api-key }}
        PXDIFF_API_URL: ${{ inputs.api-url }}
      run: |
        set -euo pipefail

        STORYBOOK_ARGS="${{ inputs.build-dir }} --suite ${{ inputs.suite }} --output json"

        if [ "${{ inputs.auto-baseline }}" = "true" ]; then
          STORYBOOK_ARGS="$STORYBOOK_ARGS --auto-baseline"
        fi

        if [ -n "${{ inputs.filter }}" ]; then
          STORYBOOK_ARGS="$STORYBOOK_ARGS --filter ${{ inputs.filter }}"
        fi

        if [ "${{ inputs.only-changed }}" = "true" ]; then
          STORYBOOK_ARGS="$STORYBOOK_ARGS --only-changed"
        fi

        CAPTURE_JSON=$(npx pxdiff storybook $STORYBOOK_ARGS)
        echo "capture-json=$CAPTURE_JSON" >> "$GITHUB_OUTPUT"

    - name: Run npx pxdiff diff
      id: result
      shell: bash
      if: inputs.auto-baseline != 'true'
      env:
        PXDIFF_API_KEY: ${{ inputs.api-key }}
        PXDIFF_API_URL: ${{ inputs.api-url }}
      run: |
        set -uo pipefail

        CAPTURE_JSON='${{ steps.capture.outputs.capture-json }}'
        CAPTURE_ID=$(echo "$CAPTURE_JSON" | jq -r '.captureId')
        echo "capture-id=$CAPTURE_ID" >> "$GITHUB_OUTPUT"

        # If captureId is null, all stories were unchanged (change detection skipped everything)
        if [ "$CAPTURE_ID" = "null" ]; then
          echo "status=passed" >> "$GITHUB_OUTPUT"
          echo "changed=0" >> "$GITHUB_OUTPUT"
          echo "new=0" >> "$GITHUB_OUTPUT"
          echo "::notice::All stories unchanged — change detection skipped capture"
          exit 0
        fi

        DIFF_ARGS="--suite ${{ inputs.suite }} --head-capture $CAPTURE_ID --output json --status"

        if [ "${{ inputs.auto-approve }}" = "true" ]; then
          DIFF_ARGS="$DIFF_ARGS --auto-approve"
        fi

        if [ -n "${{ inputs.threshold }}" ]; then
          DIFF_ARGS="$DIFF_ARGS --threshold ${{ inputs.threshold }}"
        fi

        # Pass manifest from change detection to diff for carry-forward
        MANIFEST=$(echo "$CAPTURE_JSON" | jq -r '.manifest // empty | join(",")')
        if [ -n "$MANIFEST" ]; then
          DIFF_ARGS="$DIFF_ARGS --manifest $MANIFEST"
        fi

        DIFF_JSON=$(npx pxdiff diff $DIFF_ARGS)

        DIFF_ID=$(echo "$DIFF_JSON" | jq -r '.diffId')
        CHANGED=$(echo "$DIFF_JSON" | jq -r '.summary.changed')
        NEW=$(echo "$DIFF_JSON" | jq -r '.summary.new')
        REVIEW_URL=$(echo "$DIFF_JSON" | jq -r '.reviewUrl // empty')

        echo "diff-id=$DIFF_ID" >> "$GITHUB_OUTPUT"
        echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
        echo "new=$NEW" >> "$GITHUB_OUTPUT"
        echo "diff-url=$REVIEW_URL" >> "$GITHUB_OUTPUT"
        echo "status=passed" >> "$GITHUB_OUTPUT"

    - name: Set outputs for auto-baseline
      id: baseline-result
      shell: bash
      if: inputs.auto-baseline == 'true'
      run: |
        CAPTURE_JSON='${{ steps.capture.outputs.capture-json }}'
        CAPTURE_ID=$(echo "$CAPTURE_JSON" | jq -r '.captureId')
        echo "capture-id=$CAPTURE_ID" >> "$GITHUB_OUTPUT"
        echo "status=passed" >> "$GITHUB_OUTPUT"
        echo "changed=0" >> "$GITHUB_OUTPUT"
        echo "new=0" >> "$GITHUB_OUTPUT"
