name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver tag (e.g. 0.0.3)"
        required: true
        type: string
      cli-range:
        description: "CLI version range (e.g. ~0.0.18)"
        required: true
        type: string
      source-sha:
        description: "Commit SHA in pxdiff/pxdiff to pull action files from"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate version
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format. Use semver (e.g. 0.0.3)"
            exit 1
          fi

      - name: Fetch action files from source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: pxdiff/pxdiff
          ref: ${{ inputs.source-sha }}
          ssh-key: ${{ secrets.SOURCE_DEPLOY_KEY }}
          sparse-checkout: storybook-action
          path: _source

      - name: Update action files
        run: |
          set -euo pipefail

          # Clear existing files (except .git, .github, _source)
          find . -maxdepth 1 ! -name '.git' ! -name '.github' ! -name '.' ! -name '_source' -exec rm -rf {} +

          # Copy action files and stamp CLI version
          cp -r _source/storybook-action/. .
          rm -rf _source
          sed -i "s|__CLI_VERSION__|${{ inputs.cli-range }}|g" action.yml

      - name: Commit and tag
        run: |
          set -euo pipefail

          VERSION="v${{ inputs.version }}"
          MAJOR_TAG="v$(echo "${{ inputs.version }}" | cut -d. -f1)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "No changes to publish" && exit 0
          git commit -m "release: ${VERSION} (cli ${{ inputs.cli-range }})"
          git push origin main

          # Create version tag
          git tag -f "$VERSION"
          git push origin "$VERSION" --force

          # Update floating major tag
          git tag -f "$MAJOR_TAG"
          git push origin "$MAJOR_TAG" --force
